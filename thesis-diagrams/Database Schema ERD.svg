l_amount : number</text><g data-visibility-modifier="IE_MANDATORY"><ellipse cx="465.83" cy="535.017" fill="#000000" rx="3" ry="3" style="stroke:#000000;stroke-width:1;"/></g><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="509.8584" x="474.83" y="538.808">status : string ("pending" | "preparing" | "ready" | "completed" | "cancelled")</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="272.7334" x="474.83" y="555.2963">order_type : string ("pickup" | "delivery")</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="155.6748" x="474.83" y="571.7845">created_at : timestamp</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="161.2871" x="474.83" y="588.2728">updated_at : timestamp</text><line style="stroke:#181818;stroke-width:1;stroke-dasharray:1,2;" x1="455.83" x2="989.6884" y1="595.2259" y2="595.2259"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="242.5938" x="460.83" y="612.7611">[PLACEHOLDER] payment_id : string</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="279.3438" x="460.83" y="629.2494">[PLACEHOLDER] delivery_address : object</text></g><g class="entity" data-qualified-name="GMN10" data-source-line="60" id="ent0011"><path d="M414.42,697.2083 L414.42,814.3821 A0,0 0 0 0 414.42,814.3821 L1031.1158,814.3821 A0,0 0 0 0 1031.1158,814.3821 L1031.1158,707.2083 L1021.1158,697.2083 L726.76,697.2083 L722.76,636.6983 L718.76,697.2083 L414.42,697.2083 A0,0 0 0 0 414.42,697.2083" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1021.1158,697.2083 L1021.1158,707.2083 L1031.1158,707.2083 L1021.1158,697.2083" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="147.6655" x="420.42" y="714.7766">Key Design Decisions:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="595.6958" x="420.42" y="730.0872">1. Denormalization: Orders store redundant item data for historical accuracy and performance</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="539.8872" x="420.42" y="745.3977">2. Flat Array Customizations: Simple string array for easier UI, limited to fixed pricing</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="502.6392" x="420.42" y="760.7083">3. Status Enum: Predefined statuses enable real-time kitchen workflow tracking</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="480.8921" x="420.42" y="776.0188">4. Snake_case Naming: All fields use snake_case per Firestore best practices</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="450.2075" x="420.42" y="791.3294">5. Auto-generated IDs: Simplifies client-side code, ensures uniqueness</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="563.5576" x="420.42" y="806.6399">6. [PLACEHOLDER] Fields: Loyalty points, payment info marked for future implementation</text></g><!--link users to orders--><g class="link" data-entity-1="ent0002" data-entity-2="ent0007" data-link-type="crowfoot" data-source-line="56" id="lnk8"><path codeLine="56" d="M883.4717,235.2834 C863.0417,266.8334 853.3315,281.8379 830.2215,317.5379" fill="none" id="users-orders" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;" x1="882.2883" x2="889.0034" y1="229.7517" y2="234.1"/><line style="stroke:#181818;stroke-width:1;" x1="880.6577" x2="887.3728" y1="232.2698" y2="236.6181"/><line style="stroke:#181818;stroke-width:1;" x1="883.4717" x2="887.82" y1="235.2834" y2="