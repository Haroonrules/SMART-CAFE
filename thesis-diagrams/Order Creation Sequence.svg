" width="10" x="884.0566" y="588.5664"/></g><g class="message" data-entity-1="part1" data-entity-2="part2" id="msg1"><polygon fill="#181818" points="224.0635,161.5977,234.0635,165.5977,224.0635,169.5977,228.0635,165.5977" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;" x1="53.9731" x2="230.0635" y1="165.5977" y2="165.5977"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="139.9658" x="60.9731" y="145.5449">1. Clicks "Place Order"</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="163.0903" x="60.9731" y="160.8555">button in CheckoutScreen</text></g><g class="message" data-entity-1="part2" data-entity-2="part2" id="msg2"><line style="stroke:#181818;stroke-width:1;" x1="246.0635" x2="288.0635" y1="210.2188" y2="210.2188"/><line style="stroke:#181818;stroke-width:1;" x1="288.0635" x2="288.0635" y1="210.2188" y2="223.2188"/><line style="stroke:#181818;stroke-width:1;" x1="247.0635" x2="288.0635" y1="223.2188" y2="223.2188"/><polygon fill="#181818" points="257.0635,219.2188,247.0635,223.2188,257.0635,227.2188,253.0635,223.2188" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="144.7202" x="253.0635" y="190.166">2. Validates cart items,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="94.7515" x="253.0635" y="205.4766">calculates total</text></g><g class="message" data-entity-1="part2" data-entity-2="part4" id="msg3"><polygon fill="#181818" points="576.0156,248.5293,586.0156,252.5293,576.0156,256.5293,580.0156,252.5293" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;" x1="246.0635" x2="582.0156" y1="252.5293" y2="252.5293"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="122.4717" x="253.0635" y="247.7871">3. auth.currentUser</text></g><g class="message" data-entity-1="part4" data-entity-2="part2" id="msg4"><polygon fill="#181818" points="257.0635,277.8398,247.0635,281.8398,257.0635,285.8398,253.0635,281.8398" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;stroke-dasharray:2,2;" x1="251.0635" x2="587.0156" y1="281.8398" y2="281.8398"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="120.3452" x="263.0635" y="277.0977">4. Returns user.uid</text></g><g class="message" data-entity-1="part2" data-entity-2="part2" id="msg5"><line style="stroke:#181818;stroke-width:1;" x1="246.0635" x2="288.0635" y1="341.7715" y2="341.7715"/><line style="stroke:#181818;stroke-width:1;" x1="288.0635" x2="288.0635" y1="341.7715" y2="354.7715"/><line style="stroke:#181818;stroke-width:1;" x1="247.0635" x2="288.0635" y1="354.7715" y2="354.7715"/><polygon fill="#181818" points="257.0635,350.7715,247.0635,354.7715,257.0635,358.7715,253.0635,354.7715" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="175.8936" x="253.0635" y="306.4082">5. Creates order object with</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="192.791" x="253.0635" y="321.7188">user_id, items[], total_amount,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="183.333" x="253.0635" y="337.0293">status="pending", created_at</text></g><g class="message" data-entity-1="part2" data-entity-2="part5" id="msg6"><polygon fill="#181818" points="672.9795,395.3926,682.9795,399.3926,672.9795,403.3926,676.9795,399.3926" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;" x1="246.0635" x2="678.9795" y1="399.3926" y2="399.3926"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="113.3882" x="253.0635" y="379.3398">6. addDoc(orders,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="67.2344" x="253.0635" y="394.6504">orderData)</text></g><g class="message" data-entity-1="part5" data-entity-2="part5" id="msg7"><line style="stroke:#181818;stroke-width:1;" x1="694.9795" x2="736.9795" y1="444.0137" y2="444.0137"/><line style="stroke:#181818;stroke-width:1;" x1="736.9795" x2="736.9795" y1="444.0137" y2="457.0137"/><line style="stroke:#181818;stroke-width:1;" x1="695.9795" x2="736.9795" y1="457.0137" y2="457.0137"/><polygon fill="#181818" points="705.9795,453.0137,695.9795,457.0137,705.9795,461.0137,701.9795,457.0137" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="165.0771" x="701.9795" y="423.9609">7. Stores order document,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="90.0415" x="701.9795" y="439.2715">returns doc ID</text></g><g class="message" data-entity-1="part5" data-entity-2="part2" id="msg8"><polygon fill="#181818" points="257.0635,482.3242,247.0635,486.3242,257.0635,490.3242,253.0635,486.3242" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;stroke-dasharray:2,2;" x1="251.0635" x2="688.9795" y1="486.3242" y2="486.3242"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="120.6118" x="263.0635" y="481.582">8. Returns order ID</text></g><g class="message" data-entity-1="part2" data-entity-2="part2" id="msg9"><line style="stroke:#181818;stroke-width:1;" x1="246.0635" x2="288.0635" y1="530.9453" y2="530.9453"/><line style="stroke:#181818;stroke-width:1;" x1="288.0635" x2="288.0635" y1="530.9453" y2="543.9453"/><line style="stroke:#181818;stroke-width:1;" x1="247.0635" x2="288.0635" y1="543.9453" y2="543.9453"/><polygon fill="#181818" points="257.0635,539.9453,247.0635,543.9453,257.0635,547.9453,253.0635,543.9453" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="122.7002" x="253.0635" y="510.8926">9. Clears cart state,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="123.9951" x="253.0635" y="526.2031">shows confirmation</text></g><g class="message" data-entity-1="part5" data-entity-2="part6" id="msg10"><polygon fill="#181818" points="872.0566,584.5664,882.0566,588.5664,872.0566,592.5664,876.0566,588.5664" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;" x1="689.9795" x2="878.0566" y1="588.5664" y2="588.5664"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="156.9395" x="696.9795" y="568.5137">10. onSnapshot() detects</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="63.4893" x="696.9795" y="583.8242">new order</text></g><g class="message" data-entity-1="part6" data-entity-2="part6" id="msg11"><line style="stroke:#181818;stroke-width:1;" x1="894.0566" x2="936.0566" y1="638.1875" y2="638.1875"/><line style="stroke:#181818;stroke-width:1;" x1="936.0566" x2="936.0566" y1="638.1875" y2="651.1875"/><line style="stroke:#181818;stroke-width:1;" x1="889.0566" x2="936.0566" y1="651.1875" y2="651.1875"/><polygon fill="#181818" points="899.0566,647.1875,889.0566,651.1875,899.0566,655.1875,895.0566,651.1875" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="143.1714" x="901.0566" y="618.1348">11. Renders new order</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="106.4121" x="901.0566" y="633.4453">card in real-time</text></g><path d="M5,659.1875 L5,745.1875 L939,745.1875 L939,669.1875 L929,659.1875 L5,659.1875" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M929,659.1875 L929,669.1875 L939,669.1875 L929,659.1875" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="180.1211" x="162.1584" y="676.7559">Key Implementation Notes:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="327.1265" x="162.1584" y="692.0664">&#8226; Cart validation happens client-side before API call</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="455.8887" x="162.1584" y="707.377">&#8226; Order creation is atomic - all data written in single Firestore operation</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="531.7622" x="162.1584" y="722.6875">&#8226; Real-time updates use Firestore onSnapshot() WebSocket connection (&lt;1s latency)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="610.9556" x="162.1584" y="737.998">&#8226; [PLACEHOLDER]: Payment integration would occur between steps 5-6 in future implementation</text><?plantuml-src TLJRRXCn47tVhnZbAP6IXG8jK9LAKTAAg1MD4W4FJLLvlPF6TDTUx77IlF4jV1fVmdYTsvRovhNdp9mvStP8KO4mBOKb68WvGWzkR8uM1XO5AQDXYZyzQeamLEB1YZ99X2J30TwHAT4c5MELL9NG1Aq9yYjSMgC9TJxJxG6_3iBN4tLQ8DpkhOcxUAeiEiVLx18ju_eZ65lpj8wWUDs4N2gBcN08VK-BEYeS_erXcXPdUYX8XF18OdlV3E_dfT8m56wH6M43_Ij5Se5yfrnLY0sREYn9jWf0xtpN5Pp2KGg3Gib71wrn8LYuMj3MJ6UUY0Nb2eC5oaVZQIejeWw2ggKWt6kJxF8rSxz9uPieLCx13cGOcY8iNNUcfIYaB-fxCYIAPegW3CFVfY3ub4flBMhwwbZJ-gdNBFCkXGcIjzg1vvZKg_zJEawZLxYmgPrZiX_87bWfMinqWD-hl1jvtjvr8xjxKHglYNax4kJTfrR5sPH-Q7L1rjdoUq7FQcvdnaLFk94y7nhPhci60Uf367BdGC_Tc9Cz-bcgzobCmt5BFpVIbrXpiniD-0f6mqQEfWOVzdh591oTuuiqNXRnO_0C2hiPQX05WpWBi-8he-VAblNl-AoHQ5ZstEiKZ9vgKJ64sXt8aNW8RgOrhYAdlIeR-qRiOPAZq8OEUi8E5fnbys1Q7alH8rNYOMkRN8VDxZoi3N-Q9UvtHNSJ3t2MdL_X6aPbLM1GE-wQBunmfsUlidCE-VFhDuJj0Sle-12m41KRXIKf58DwJkK86Sw36ltnYCKhYWqoRZ6vt