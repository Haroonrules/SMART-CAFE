="entity" data-qualified-name="DATA TIER.nFirebase Cloud Services.encryption" data-source-line="29" id="ent0021"><path d="M1808.52,526.4483 C1808.52,516.4483 1881.9951,516.4483 1881.9951,516.4483 C1881.9951,516.4483 1955.4702,516.4483 1955.4702,526.4483 L1955.4702,584.9131 C1955.4702,594.9131 1881.9951,594.9131 1881.9951,594.9131 C1881.9951,594.9131 1808.52,594.9131 1808.52,584.9131 L1808.52,526.4483" fill="#F1F1F1" style="stroke:#181818;stroke-width:0.5;"/><path d="M1808.52,526.4483 C1808.52,536.4483 1881.9951,536.4483 1881.9951,536.4483 C1881.9951,536.4483 1955.4702,536.4483 1955.4702,526.4483" fill="none" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="107.4883" x="1818.52" y="553.9834">Data Encryption</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="107.1738" x="1818.52" y="570.4717">AES-256 at rest</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="126.9502" x="1818.52" y="586.96">TLS 1.2+ in transit</text></g><g class="entity" data-qualified-name="GMN25" data-source-line="38" id="ent0026"><path d="M1987.44,655.9083 L1987.44,742.461 A0,0 0 0 0 1987.44,742.461 L2622.5694,742.461 A0,0 0 0 0 2622.5694,742.461 L2622.5694,665.9083 L2612.5694,655.9083 L2181.48,655.9083 L1955.68,581.3283 L2173.48,655.9083 L1987.44,655.9083 A0,0 0 0 0 1987.44,655.9083" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M2612.5694,655.9083 L2612.5694,665.9083 L2622.5694,665.9083 L2612.5694,655.9083" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="187.605" x="1993.44" y="673.4766">Key Architectural Decisions:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="512.7256" x="1993.44" y="688.7872">1. Single-Page Application (SPA): React enables dynamic UX without page reloads</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="614.1294" x="1993.44" y="704.0977">2. Serverless Backend: Express server handles AI proxying only; Firebase manages auth/database</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="482.8345" x="1993.44" y="719.4083">3. Real-Time First: Firestore onSnapshot replaces HTTP polling (&lt;1s latency)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="448.646" x="1993.44" y="734.7188">4. Component Reusability: Generic EntityModal for all CRUD operations</text></g><!--link react to express--><g class="link" data-entity-1="ent0003" data-entity-2="ent0010" data-link-type="dependency" data-source-line="33" id="lnk22"><path d="M1162.05,170.2383 C1155.94,171.6783 1149.9,173.0983 1144,174.4683 C1037.01,199.4183 1003.13,184.2683 903,229.4683 C860.45,248.6783 822.3878,277.2414 793.8778,301.2714" fill="none" id="react-to-express" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="789.29,305.1383,798.7495,302.3965,793.1131,301.9159,793.5937,296.2795,789.29,305.1383" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="109.7256" x="971.12" y="218.0366">HTTPS / REST API</text></g><!--link context to firestore--><g class="link" data-entity-1="ent0005" data-entity-2="ent0017" data-link-type="dependency" data-source-line="34" id="lnk23"><path d="M1416.66,171.6083 C1345.66,190.9283 1263.72,215.6583 1253,229.4683 C1187.71,313.5483 1207.3271,443.9898 1223.0171,510.2298" fill="none" id="context-to-firestore" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="1224.4,516.0683,1226.2179,506.3887,1223.2476,511.2029,1218.4333,508.2326,1224.4,516.0683" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" f